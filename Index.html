<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CELESTIA">
<meta name="theme-color" content="#06061A">
<title>CELESTIA ✦ 毎日の運勢</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@300;400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#06061A;color:#F0EBE0;font-family:'Noto Serif JP',serif;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 80px}

/* ─── ロゴ ─── */
.logo{font-family:'Cinzel',serif;font-size:22px;color:#C9A84C;letter-spacing:5px;text-align:center;margin-bottom:3px}
.logo-sub{font-size:10px;color:#3A2A1A;letter-spacing:2px;text-align:center;margin-bottom:22px}

/* ─── 言語バー ─── */
.lang-row{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:22px}
.lb{border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:9px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.02);user-select:none}
.lb:active{transform:scale(.95)}
.lb.sel{border-color:#C9A84C;background:rgba(201,168,76,.13)}
.lb-f{font-size:20px}
.lb-n{font-size:8px;color:#5A4A3A}
.lb.sel .lb-n{color:#C9A84C}

/* ─── 星座 ─── */
.lbl{font-family:'Cinzel',serif;font-size:11px;color:#C9A84C;letter-spacing:2px;margin-bottom:9px;display:block}
.zgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px}
.zcard{background:rgba(255,255,255,.04);border:2px solid rgba(201,168,76,.15);border-radius:13px;padding:14px 6px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.zcard:active{transform:scale(.96)}
.zcard.sel{background:rgba(201,168,76,.16);border-color:#C9A84C}
.zsym{font-size:22px;display:block;margin-bottom:3px}
.znm{font-size:10px;color:#7A6A5A}
.zcard.sel .znm{color:#C9A84C}

/* ─── 生年月日 ─── */
.brow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.bi{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.18);border-radius:10px;padding:11px 6px;color:#F0EBE0;font-size:13px;text-align:center;outline:none;-webkit-appearance:none;font-family:'Noto Serif JP',serif}
.bi:focus{border-color:#C9A84C}
.bi::placeholder{color:#3A2A1A;font-size:11px}

/* ─── ボタン ─── */
.gbtn{width:100%;padding:16px;background:linear-gradient(135deg,#C9A84C,#8A6010);border:none;border-radius:13px;color:#06061A;font-family:'Cinzel',serif;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-bottom:10px;-webkit-appearance:none}
.gbtn:active{transform:scale(.98)}
.gbtn:disabled{opacity:.4;cursor:default}
.gbtn-out{background:transparent;border:1px solid rgba(201,168,76,.3);color:#C9A84C}

/* ─── ローダー ─── */
.loader{display:none;text-align:center;padding:70px 20px}
.loader.on{display:block}
.ring{width:72px;height:72px;border-radius:50%;border:2px solid rgba(201,168,76,.1);border-top-color:#C9A84C;animation:sp 1s linear infinite;margin:0 auto 18px;position:relative}
.ring::after{content:'✦';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;color:#C9A84C;animation:sp 1s linear infinite reverse}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:#4A3A2A;animation:fp 2s ease-in-out infinite}
@keyframes fp{0%,100%{opacity:.3}50%{opacity:1}}

/* ─── 結果 ─── */
.result{display:none}.result.on{display:block}

.res-top{text-align:center;margin-bottom:22px}
.res-sym{font-size:64px;display:block;margin-bottom:8px;animation:fl 4s ease-in-out infinite;filter:drop-shadow(0 0 16px rgba(201,168,76,.4))}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.res-sname{font-family:'Cinzel',serif;font-size:13px;color:#C9A84C;letter-spacing:3px;margin-bottom:4px}
.res-date{font-size:11px;color:#3A2A1A}

/* キーワード */
.keyword{background:linear-gradient(135deg,rgba(107,70,193,.15),rgba(201,168,76,.07));border:1px solid rgba(201,168,76,.25);border-radius:16px;padding:20px;text-align:center;margin-bottom:14px;position:relative}
.keyword::before{content:'✦';position:absolute;top:10px;left:14px;font-size:11px;color:rgba(201,168,76,.25)}
.keyword::after{content:'✦';position:absolute;top:10px;right:14px;font-size:11px;color:rgba(201,168,76,.25)}
.kw-txt{font-size:17px;color:#F0EBE0;line-height:1.6;font-weight:500}

/* 物語 — メイン */
.story{background:rgba(255,255,255,.025);border:1px solid rgba(201,168,76,.12);border-radius:16px;padding:22px;margin-bottom:14px}
.story-icon{font-size:28px;text-align:center;display:block;margin-bottom:12px}
.story-body{font-size:14px;color:rgba(240,235,224,.86);line-height:2.5}
.story-body p{margin-bottom:14px}
.story-body p:last-child{margin-bottom:0}

/* スコア */
.scores{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sc{background:rgba(255,255,255,.025);border:1px solid rgba(201,168,76,.1);border-radius:12px;padding:14px}
.sc-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.sc-lbl{font-size:11px;color:#4A3A2A}
.sc-val{font-family:'Cinzel',serif;font-size:22px;color:#C9A84C}
.sc-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.sc-fill{height:100%;border-radius:2px;transition:width 1.4s ease}

/* ─── ラッキーカード ─── */
.lucky-card{background:rgba(255,255,255,.02);border:1px solid rgba(201,168,76,.12);border-radius:16px;padding:20px;margin-bottom:14px}
.lucky-title{font-family:'Cinzel',serif;font-size:11px;color:#C9A84C;letter-spacing:2px;margin-bottom:14px}
.lucky-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lucky-item{background:rgba(255,255,255,.025);border:1px solid rgba(201,168,76,.1);border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.lucky-icon{font-size:20px;flex-shrink:0}
.lucky-info{}
.lucky-lbl{font-size:9px;color:#4A3A2A;letter-spacing:1px;margin-bottom:3px}
.lucky-val{font-size:13px;color:#F0EBE0;font-weight:500}
.lucky-item.full{grid-column:1/-1}

/* アクション */
.act-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.abtn{padding:13px;border-radius:11px;font-size:12px;cursor:pointer;text-align:center;-webkit-appearance:none}
.abtn:active{transform:scale(.97)}
.abtn-a{background:linear-gradient(135deg,#C9A84C,#8A6010);border:none;color:#06061A;font-family:'Cinzel',serif;font-weight:700;letter-spacing:1px}
.abtn-b{background:transparent;border:1px solid rgba(201,168,76,.28);color:#C9A84C;font-family:'Noto Serif JP',serif}

/* シェア */
.share{background:linear-gradient(135deg,#110F2A,#06061A);border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:20px;margin-bottom:14px;display:none}
.share.on{display:block}
.share-q{font-size:14px;line-height:2.2;color:rgba(240,235,224,.88);font-style:italic;text-align:center;margin-bottom:8px}
.share-sig{font-size:10px;color:#3A2A1A;text-align:center;font-family:'Cinzel',serif;letter-spacing:2px}

/* プレミアム */
.prem{background:linear-gradient(135deg,rgba(107,70,193,.1),rgba(201,168,76,.05));border:1px solid rgba(201,168,76,.18);border-radius:16px;padding:20px;text-align:center;margin-bottom:14px}
.prem-t{font-family:'Cinzel',serif;font-size:14px;color:#C9A84C;margin-bottom:6px}
.prem-txt{font-size:11px;color:#3A2A1A;line-height:1.9;margin-bottom:14px}
.prem-plans{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.pp{border:1px solid rgba(201,168,76,.18);border-radius:11px;padding:13px 8px;cursor:pointer;position:relative}
.pp:active{transform:scale(.97)}
.pp.hot{border-color:#C9A84C;background:rgba(201,168,76,.09)}
.pp-badge{position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:#C9A84C;color:#06061A;font-size:8px;font-weight:700;padding:2px 10px;border-radius:8px;font-family:'Cinzel',serif;white-space:nowrap}
.pp-price{font-family:'Cinzel',serif;font-size:22px;color:#C9A84C}
.pp-period{font-size:9px;color:#3A2A1A;margin-top:2px}

/* RTL */
.rtl-txt{direction:rtl;text-align:right}
</style>
</head>

// ── マヤKIN計算 ──
function calcKin(y, m, d) {
const diff = Math.round((new Date(y, m-1, d) - new Date(1994, 1, 4)) / 86400000);
return ((diff % 260) + 260) % 260 + 1;
}

// ── 占い生成 ──

if (!selSign) return;
const L = curLang;

const m = document.getElementById('bm').value;
const d = document.getElementById('bd').value;
const hasBirth = y && m && d;
const kin = hasBirth ? calcKin(+y, +m, +d) : Math.floor(Math.random() * 260) + 1;
const birthStr = hasBirth ? `${y}/${m}/${d}` : '';
const today = new Date().toLocaleDateString(L.locales, {year:'numeric',month:'long',day:'numeric',weekday:'long'});

document.getElementById('loader').classList.add('on');

method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({
model: 'claude-sonnet-4-20250514',
max_tokens: 1400,
messages: [{ role: 'user', content: L.prompt(signName, kin, birthStr, today) }]
})
});
const data = await resp.json();
const raw = (data.content?.find(b => b.type === 'text')?.text || '').replace(/```json|```/g, '').trim();
parsed = JSON.parse(raw);
} catch(e) {}

document.getElementById('loader').classList.remove('on');

const fb = {

};

parsed = {
headline: f.h, icon: '🌸', story: f.story,
scores: { overall:84, love:78, money:88, health:72 },

// ── 結果表示 ──
function renderResult(d, signName, L, code) {
document.getElementById('r-sym').textContent = selSign.s;
document.getElementById('r-sname').textContent = selSign.en.toUpperCase() + ' · ' + signName;
document.getElementById('r-date').textContent = new Date().toLocaleDateString(L.locales, {year:'numeric',month:'long',day:'numeric',weekday:'long'});
if (L.dir === 'rtl') {
document.getElementById('r-date').style.direction = 'rtl';
document.getElementById('r-sname').style.direction = 'ltr';
}

document.getElementById('r-kw').textContent = d.headline || '';
document.getElementById('r-icon').textContent = d.icon || '🌙';

// 物語
const sb = document.getElementById('r-story');
sb.innerHTML = '';
if (L.dir === 'rtl') sb.classList.add('rtl-txt'); else sb.classList.remove('rtl-txt');
(d.story || '').split(/\n+/).filter(p => p.trim()).forEach(p => {
const el = document.createElement('p'); el.textContent = p; sb.appendChild(el);
});

// スコア
const sg = document.getElementById('r-scores'); sg.innerHTML = '';
['overall','love','money','health'].forEach((k, i) => {
const v = Math.min(100, Math.max(0, d.scores[k] || 75));
const el = document.createElement('div'); el.className = 'sc';
el.innerHTML = `<div class="sc-top"><span class="sc-lbl">${L.scores[i]}</span><span class="sc-val">${v}</span></div><div class="sc-bar"><div class="sc-fill" style="width:0%;background:${SC_C[k]}" data-w="${v}"></div></div>`;
sg.appendChild(el);
});
setTimeout(() => document.querySelectorAll('.sc-fill').forEach(el => el.style.width = el.dataset.w + '%'), 150);

// ラッキー7種類
const lg = document.getElementById('r-lucky'); lg.innerHTML = '';
LUCKY_KEYS.forEach((k, i) => {
const val = d.lucky?.[k] || '—';
const el = document.createElement('div');
el.className = 'lucky-item' + (k === 'food' ? ' full' : '');
el.innerHTML = `<span class="lucky-icon">${L.luckyLabels[i].split(' ')[0]}</span><div class="lucky-info"><div class="lucky-lbl">${L.luckyLabels[i].replace(/^[^\s]+\s/,'')}</div><div class="lucky-val">${val}</div></div>`;

});

document.getElementById('r-shareq').textContent = '「' + (d.shareQuote || '') + '」';
if (L.dir === 'rtl') document.getElementById('r-shareq').style.direction = 'rtl';

document.getElementById('shareBox').classList.remove('on');
document.getElementById('result').classList.add('on');
window.scrollTo(0, 0);
}

function toggleShare() {
document.getElementById('shareBox').classList.toggle('on');
}

function goHome() {
document.getElementById('result').classList.remove('on');
document.getElementById('shareBox').classList.remove('on');
document.querySelectorAll('.zcard').forEach(x => x.classList.remove('sel'));
selSign = null;
document.getElementById('genBtn').disabled = true;
document.getElementById('formArea').style.display = 'block';
window.scrollTo(0, 0);
}

// 初期化
buildZodiac(LANGS.ja);
applyUI(LANGS.ja);
</script>
